server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-stacktrace: never
    include-exception: false

spring:
  application:
    name: carfinder

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/carfinder_db}
    username: ${PGUSER:carfinder}
    password: ${PGPASSWORD:carfinder123}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        sslmode: require

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

# Anthropic AI Configuration
anthropic:
  api-key: ${ANTHROPIC_API_KEY:your_api_key_here}

# CORS Configuration
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://frontend:5173}